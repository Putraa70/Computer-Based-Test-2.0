; ============================================================================
; PHP-FPM Configuration for CBT System (100 Concurrent Users)
; ============================================================================
; Place this file at: /etc/php/8.3/fpm/pool.d/www-cbt.conf
; Reference: /etc/php/8.3/fpm/pool.d/www.conf (backup original first!)
;
; After changes, reload: sudo systemctl reload php8.3-fpm
; ============================================================================

[www-cbt]
; Worker process identity (required)
user = www-data
group = www-data

; ============================================================================
; UNIX socket LISTEN CONFIGURATION
; ============================================================================
; Use Unix socket instead of TCP for better performance
listen = /run/php/php8.3-fpm-www-cbt.sock

; Socket ownership
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Backlog for pending connections
listen.backlog = 512

; ============================================================================
; PROCESS MANAGEMENT (Dynamic)
; ============================================================================
; For 100 concurrent users: total_processes = 4 per logical CPU
; Assuming 64-core system: 4 × 64 = 256 processes

pm = dynamic
pm.max_children = 256         ; Maximum worker processes
pm.start_servers = 96         ; 37.5% of max = ~96 (steady state)
pm.min_spare_servers = 48     ; 18.75% of max = ~48 (minimum idle)
pm.max_spare_servers = 128    ; 50% of max = ~128 (maximum idle)

; Process idle timeout (seconds)
pm.process_idle_timeout = 30s

; ============================================================================
; REQUEST HANDLING
; ============================================================================
; Timeout for individual PHP request execution
request_terminate_timeout = 60s

; Restart worker after N requests (prevents memory leaks)
pm.max_requests = 10000

; ============================================================================
; LOGGING
; ============================================================================
; Access log (useful for profiling)
access.log = /var/log/php-fpm/php8.3-fpm.access.log.cbt
access.format = "%R - %u %t \"%m %r%Q%q\" %s %{mili}dms %{kilobytes}M %C%%"

; Slow log (requests taking > 10s)
slowlog = /var/log/php-fpm/php8.3-fpm.slow.log.cbt
request_slowlog_timeout = 10s

; Note: error_log and log_level are global php-fpm.conf directives,
; not valid inside pool config on Ubuntu PHP-FPM 8.3.

; ============================================================================
; OPCACHE CONFIGURATION (In PHP config, not here, but documented for reference)
; ============================================================================
; These go in /etc/php/8.3/fpm/conf.d/10-opcache.ini
; opcache.enable = 1
; opcache.memory_consumption = 256         ; 256 MB for opcache
; opcache.interned_strings_buffer = 16    ; 16 MB for string interning
; opcache.max_accelerated_files = 20000   ; Cache 20K files
; opcache.revalidate_freq = 60             ; Revalidate every 60s in dev, 0 in prod
; opcache.validate_timestamps = 1         ; Check file modification
; opcache.fast_shutdown = 1                ; Fast shutdown
; opcache.jit = 1254                       ; JIT compilation for 8.3+
; opcache.jit_buffer_size = 64M             ; 64 MB for JIT

; ============================================================================
; ENVIRONMENT & RESOURCES
; ============================================================================
; Catch workers in infinite loops
catch_workers_output = yes

; Decimal places for logged execution time
decorate_workers_output = yes

; ============================================================================
; SECURITY
; ============================================================================
; Chroot jail (optional, advanced)
; chroot = /var/www

; ============================================================================
; STATUS & MONITORING
; ============================================================================
; Status page endpoint (internal use only, restrict in Nginx!)
pm.status_path = /status

; Ping endpoint (for health checks)
ping.path = /ping
ping.response = pong

; ============================================================================
; DEPLOYMENT NOTES
; ============================================================================
; 1. Create socket directory if needed:
;    sudo mkdir -p /run/php
;    sudo chown www-data:www-data /run/php
;
; 2. Reload PHP-FPM:
;    sudo systemctl reload php8.3-fpm
;
; 3. Verify socket creation:
;    ls -la /run/php/php8.3-fpm-www-cbt.sock
;
; 4. Monitor process count:
;    ps aux | grep "php-fpm" | wc -l
;
; 5. Check status endpoint (from localhost):
;    curl http://127.0.0.1:9001/status  (if TCP) OR
;    SCRIPT_NAME=/status SCRIPT_FILENAME=/status REQUEST_METHOD=GET \
;      REMOTE_ADDR=127.0.0.1 cgi-fcgi -bind -connect /run/php/php8.3-fpm-www-cbt.sock
;
; 6. Slow log analysis:
;    tail -f /var/log/php-fpm/php8.3-fpm.slow.log.cbt
;
; 7. Memory usage per worker (in bytes):
;    ps aux | grep 'php-fpm' | awk '{sum+=$6; count++} END {print "Avg: " sum/count " KB"}'
