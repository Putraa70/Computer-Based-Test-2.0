#     multi_accept on;
#     tcp_nopush on;
#     tcp_nodelay on;
# }

# ============================================================================
# SERVER BLOCK: Main Application
# ============================================================================
server {
    listen 80;
    listen [::]:80;

    # Change to your domain
    server_name localhost 127.0.0.1;

    # Change to your Laravel public directory
    root /home/putradev/Dev/Projects/Computer-Based-Test/public;
    index index.php;

    # ===== LOGGING =====
    access_log /var/log/nginx/cbt-access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/cbt-error.log warn;

    # ===== SECURITY HEADERS =====
    # (Only if not handled by Laravel)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===== STATIC ASSETS (High Cache TTL) =====
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== HEALTH CHECK ENDPOINTS =====
    # Check Redis status (optional)
    location /healthz {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }

    # PHP-FPM status page (internal only!)
    location ~ ^/(status|ping)$ {
        access_log off;
        # Restrict to localhost
        allow 127.0.0.1;
        allow ::1;
        deny all;

        fastcgi_pass php_fpm_cbt;
        fastcgi_param SCRIPT_FILENAME $fastcgi_script_name;
        include fastcgi_params;
    }

    # ===== PREVENT ACCESS TO SENSITIVE FILES =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(config|database|storage|vendor|routes)/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== LARAVEL NON-PUBLIC ROUTES =====
    location ~ ^/(artisan|composer|package.json|vite.config.js) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== LARAVEL PUBLIC ROUTES =====
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ===== PHP-FPM HANDLER (Critical Performance Section) =====
    location ~ \.php$ {
        # Verify file exists before passing to PHP-FPM
        try_files $uri =404;

        # ===== FASTCGI PASS (Send to PHP-FPM) =====
        fastcgi_pass php_fpm_cbt;

        # ===== FASTCGI PARAMETERS =====
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Include standard FastCGI parameters
        include fastcgi_params;

        # ===== FASTCGI TIMEOUTS (Critical!) =====
        # Connection establishment timeout (should be quick)
        fastcgi_connect_timeout 5s;

        # Time to wait for FastCGI server to send data
        fastcgi_send_timeout 30s;

        # Time to wait for response from FastCGI server
        fastcgi_read_timeout 30s;

        # ===== FASTCGI BUFFERING (Improves throughput) =====
        fastcgi_buffering on;
        fastcgi_buffer_size 4k;
        fastcgi_buffers 8 4k;
        fastcgi_busy_buffers_size 8k;
        fastcgi_max_temp_file_size 10m;
        fastcgi_temp_file_write_size 256k;

        # ===== FASTCGI CACHE (Optional, for repeatable requests) =====
        # Requires "fastcgi_cache_path" in http block:
        # fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=php_cache:10m;
        #
        # fastcgi_cache php_cache;
        # fastcgi_cache_valid 200 10m;
        # fastcgi_cache_bypass $http_cache_control $http_pragma;
        # fastcgi_no_cache $http_cache_control $http_pragma;
        # add_header X-Cache-Status $upstream_cache_status;

        # ===== KEEP-ALIVE TO PHP-FPM =====
        fastcgi_keep_conn on;

        # ===== CHUNKED TRANSFER (HTTP/1.1) =====
        # Allows PHP to send response before complete (for streaming)
        # Already enabled by default in Nginx 1.21+

        # ===== ERROR HANDLING =====
        error_page 502 503 504 /50x.html;
    }

    # ===== LARAVEL API RATE LIMITING (Optional, if using Laravel's rate limiter) =====
    # location ~ ^/api/ {
    #     # Laravel handle via middleware (Illuminate\Routing\Middleware\ThrottleRequests)
    #     try_files $uri /index.php?$query_string;
    # }

    # ===== ERROR PAGES =====
    error_page 502 503 504 @temporary_error;

    location @temporary_error {
        default_type text/html;
        return 503 '<h1>503 Service Unavailable</h1><p>The server is temporarily overloaded. Please try again in a moment.</p>';
    }
}

# ============================================================================
# DEPLOYMENT CHECKLIST
# ============================================================================
# 1. Copy PHP-FPM config:
#    sudo cp php-fpm-cbt.conf /etc/php/8.3/fpm/pool.d/
#    sudo mkdir -p /run/php
#    sudo chown www-data:www-data /run/php
#
# 2. Verify PHP-FPM config:
#    sudo php-fpm8.3 -t
#
# 3. Restart PHP-FPM:
#    sudo systemctl restart php8.3-fpm
#
# 4. Copy Nginx config:
#    sudo cp nginx-cbt.conf /etc/nginx/sites-available/cbt-exam
#    sudo nginx -t
#    sudo systemctl restart nginx
#
# 5. Monitor during load test:
#    - CPU usage: top
#    - PHP-FPM workers: ps aux | grep php-fpm
#    - Memory: free -h
#    - Network: iftop
#    - Nginx status: sudo systemctl status nginx
#
# 6. Test endpoints:
#    curl -I http://127.0.0.1/healthz
#    curl http://127.0.0.1/ping
#
# ============================================================================
# PERFORMANCE TIPS
# ============================================================================
# 1. Use Unix sockets instead of TCP for local PHP-FPM (much faster)
# 2. Tune worker_connections in http block based on your hardware
# 3. Enable gzip compression for text assets (CSS, JS, JSON)
# 4. Cache static assets aggressively (30d+)
# 5. Use fastcgi_cache_path for repeatable requests
# 6. Monitor slow requests with fastcgi slow log
# 7. Set reasonable timeouts to prevent zombie connections
# 8. Use least_conn load balancing for uneven response times
# ============================================================================
