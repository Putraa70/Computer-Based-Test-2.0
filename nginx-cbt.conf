# ============================================================================
# NGINX Configuration for CBT System (100 Concurrent Users, <100ms response)
# ============================================================================
# Place content in: /etc/nginx/sites-available/cbt-exam (or your domain)
# Enable with: sudo ln -s /etc/nginx/sites-available/cbt-exam /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload: sudo systemctl reload nginx
# ============================================================================

# ============================================================================
# UPSTREAM: PHP-FPM Pool
# ============================================================================
upstream php_fpm_cbt {
    # Load balancing strategy: choose best performing worker
    least_conn;

    # Listen on the PHP-FPM socket configured in php-fpm-cbt.conf
    server unix:/run/php/php8.3-fpm-www-cbt.sock;

    # (Optional) Multiple PHP-FPM instances for even distribution
    # server unix:/run/php/php8.3-fpm-www-cbt-1.sock weight=1;
    # server unix:/run/php/php8.3-fpm-www-cbt-2.sock weight=1;
    # server unix:/run/php/php8.3-fpm-www-cbt-3.sock weight=1;
    # server unix:/run/php/php8.3-fpm-www-cbt-4.sock weight=1;

    # Keep-alive connections to reduce handshake overhead
    keepalive 32;
    keepalive_timeout 65s;
    keepalive_requests 100;
}

# ============================================================================
# UPSTREAM: Redis (for session/cache verification, optional)
# ============================================================================
upstream redis_cbt {
    server 127.0.0.1:6379 max_fails=3 fail_timeout=10s;
    keepalive 8;
}

# ============================================================================
# HTTP BLOCK CONFIGURATION (add to /etc/nginx/nginx.conf if not present)
# ============================================================================
# These should be in the http { } block of nginx.conf
# Uncomment if not already set:

# http {
